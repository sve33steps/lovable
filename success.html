<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're in! | 33steps</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #1aabb0;
      --black:   #141414;
      --white:   #fbfbfb;
      --gray-700: #828282;
    }
    body {
      font-family: 'Manrope', sans-serif;
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }
    .wordmark {
      font-size: 15px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--primary); margin-bottom: 64px;
    }
    .check {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: var(--primary);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 40px;
    }
    .check svg { width: 38px; height: 38px; }
    h1 {
      font-size: 56px; font-weight: 700; line-height: 1.1;
      margin-bottom: 20px;
    }
    .sub {
      font-size: 20px; font-weight: 500; color: var(--gray-700);
      line-height: 1.6; max-width: 440px; margin: 0 auto 56px;
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 16px 32px; border-radius: 50px;
      font-family: 'Manrope', sans-serif; font-weight: 600; font-size: 15px;
      cursor: pointer; border: none; text-decoration: none;
      background: var(--white); color: var(--black);
      transition: background 0.15s ease, transform 0.1s ease;
    }
    .btn:hover  { background: #e4e4e4; }
    .btn:active { transform: scale(0.98); }

    @media (max-width: 768px) {
      h1   { font-size: 36px; }
      .sub { font-size: 18px; }
    }
  </style>
</head>
<body>

  <p class="wordmark">33steps</p>

  <div class="check">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"
         stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"></polyline>
    </svg>
  </div>

  <h1>You're in!</h1>
  <p class="sub">Check your email — your access to The Leadership Workshop is on its way.</p>

  <a href="/" class="btn">Back to 33steps</a>
