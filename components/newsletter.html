<section id="newsletter" style="position:relative; overflow:hidden;">
  <video class="bg-video" autoplay loop muted playsinline>
    <source src="assets/videos/Newsletter-video.webm" type="video/webm">
    <source src="assets/videos/Newsletter-video.mp4" type="video/mp4">
  </video>
  <div class="video-hue-overlay"></div>
  <div class="grid-row" style="position:relative;z-index:1;">
    <div class="grid-side" style="backdrop-filter:blur(6px); background:rgba(255,255,255,0.2);"></div>
    <div class="grid-content" style="padding:64px; position:relative;z-index:1;">
      <div class="newsletter-inner">
        <h2 class="newsletter-title">Get 33 of <strong>the best leadership pieces</strong> <span style="color:var(--gray-700)">for free</span></h2>
        <p class="newsletter-sub">Articles and videos delivered daily to your inbox</p>
        <div class="newsletter-form">
          <input class="newsletter-input" type="email" placeholder="Enter your email">
          <button class="btn btn-dark">Get it</button>
        </div>
      </div>
    </div>
    <div class="grid-side" style="backdrop-filter:blur(6px); background:rgba(255,255,255,0.2);"></div>
  </div>
</section>
